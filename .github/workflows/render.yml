name: Render Video
on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - name: Render DailyMoodIntro
        run: npx remotion render src/index.ts DailyMoodIntro daily-mood-intro.mp4

      - name: Render NaverIntro
        run: npx remotion render src/index.ts NaverIntro naver-intro.mp4

      - name: Render AI/DevOps Shorts
        run: npx remotion render src/index.ts AIDevOpsShorts ai-devops-shorts.mp4

      - name: Upload DailyMoodIntro
        uses: actions/upload-artifact@v4
        with:
          name: daily-mood-intro-video
          path: daily-mood-intro.mp4

      - name: Upload NaverIntro
        uses: actions/upload-artifact@v4
        with:
          name: naver-intro-video
          path: naver-intro.mp4

      - name: Upload Shorts
        uses: actions/upload-artifact@v4
        with:
          name: ai-devops-shorts
          path: ai-devops-shorts.mp4
