name: Render Video
on:
  push:
    branches:
      - main

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Render Video
        run: npx remotion render src/index.ts NaverIntro out.mp4
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video
          path: out.mp4
